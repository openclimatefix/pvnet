_target_: pvnet.datamodule.PVNetDataModule
# Path to the data configuration yaml file. You can find examples in the configuration subdirectory
# in configs.example/datamodule/configuration
# Use the full local path such as: /FULL/PATH/PVNet/configs/datamodule/configuration/example_configuration.yaml"
configuration: "PLACEHOLDER.yaml"
num_workers: 20
prefetch_factor: 2
persistent_workers: false
batch_size: 8

train_periods:
  - [null, '2021-12-31']
  - ['2023-01-01', '2025-12-31']
    
val_periods:
  - ['2022-01-01', '2022-12-31']

seed: "${seed}"

# Setting the dataset pickle dir will speed up initiation of multiple workers
dataset_pickle_dir: null
